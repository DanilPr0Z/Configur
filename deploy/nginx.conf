server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    client_max_body_size 20M;

    # Статика Django (collectstatic)
    location /static/ {
        alias /var/www/nuovo60/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Медиафайлы (фото узлов и пр.)
    location /media/ {
        alias /var/www/nuovo60/media/;
        expires 7d;
    }

    # Django: API и админка
    location ~ ^/(api|admin)/ {
        proxy_pass http://unix:/run/nuovo60/gunicorn.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120;
    }

    # React SPA — всё остальное
    location / {
        root /var/www/nuovo60/frontend/dist;
        try_files $uri $uri/ /index.html;
    }
}
